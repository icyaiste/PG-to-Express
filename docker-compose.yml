services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: athlete
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sports_data
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - postgres

volumes:
  postgres_data: